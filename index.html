<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="description" content="Cloud service reseller billing panel with multi-provider support" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Loading...</title>
    <script type="module">
      const env = import.meta.env ?? {};
      const candidates = [env['COMPANY-NAME'], env.COMPANY_NAME, env.VITE_COMPANY_NAME];
      const companyName = candidates
        .map((value) => (typeof value === 'string' ? value.trim() : ''))
        .find((value) => value.length > 0) || 'GVPSCloud';
      document.title = `${companyName} | Cloud`;
    </script>
    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join('\n'),
            )
          }
        })
      }
    </script>
    <script type="module">
      const env = import.meta.env ?? {};
      const truthyValues = new Set(["1", "true", "yes", "on"]);
      const falsyValues = new Set(["0", "false", "no", "off"]);

      const readString = (...values) =>
        values
          .map((value) => (typeof value === "string" ? value.trim() : ""))
          .find((value) => value.length > 0) || "";

      const readBoolean = (value, fallback) => {
        if (typeof value === "boolean") {
          return value;
        }

        if (typeof value !== "string") {
          return fallback;
        }

        const normalizedValue = value.trim().toLowerCase();
        if (truthyValues.has(normalizedValue)) {
          return true;
        }

        if (falsyValues.has(normalizedValue)) {
          return false;
        }

        return fallback;
      };

      const scriptId = "gvps-rybbit-script";
      const scriptSrc = readString(
        env.VITE_RYBBIT_SCRIPT_URL,
        env.VITE_TRACKING_SCRIPT_URL,
      );
      const siteId = readString(env.VITE_RYBBIT_SITE_ID);

      if (scriptSrc && siteId && !document.getElementById(scriptId)) {
        const script = document.createElement("script");
        script.id = scriptId;
        script.src = scriptSrc;
        script.defer = true;
        script.dataset.siteId = siteId;

        if (readBoolean(env.VITE_RYBBIT_TRACK_ERRORS, true)) {
          script.dataset.trackErrors = "true";
        }

        if (readBoolean(env.VITE_RYBBIT_SESSION_REPLAY, true)) {
          script.dataset.sessionReplay = "true";
        }

        document.head.appendChild(script);
      }
    </script>
    <script>
      // Apply saved theme preference before React loads to prevent flash.
      // Standard convention: .dark class = dark mode. Default is dark.
      try {
        var pref = localStorage.getItem('user-theme-preference');
        if (pref !== 'light') {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
