<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="description" content="Cloud service reseller billing panel with multi-provider support" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Loading...</title>
    <!-- APP_RUNTIME_HEAD -->
    <script>
      // Apply saved theme preference before React loads to prevent flash.
      // Standard convention: .dark class = dark mode. Default is dark.
      try {
        var pref = localStorage.getItem('user-theme-preference');
        if (pref !== 'light') {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
